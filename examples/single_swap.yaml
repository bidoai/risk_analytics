simulation:
  n_paths: 10000
  seed: 42
  time_grid:
    type: standard

market_data:
  curves:
    USD_OIS:
      tenors: [0.25, 0.5, 1.0, 2.0, 3.0, 5.0, 7.0, 10.0]
      rates: [0.038, 0.040, 0.042, 0.044, 0.046, 0.048, 0.050, 0.052]

models:
  - name: rates_usd
    type: HullWhite1F
    params:
      a: 0.10
      sigma: 0.01
      r0: 0.04
    calibrate_to: USD_OIS

agreements:
  - id: AGR_SWAP_001
    counterparty: Counterparty_A
    cp_hazard_rate: 0.01
    own_hazard_rate: 0.005
    csa:
      mta: 50000
      threshold: 0
      margin_regime: REGVM
    netting_sets:
      - id: NS_RATES
        trades:
          - id: trade_irs_001
            type: InterestRateSwap
            model: rates_usd
            params:
              fixed_rate: 0.045
              maturity: 5.0
              notional: 10000000
              payer: true

outputs:
  confidence: 0.95
  write_raw_paths: false
