simulation:
  n_paths: 10000
  seed: 42
  time_grid:
    type: standard

market_data:
  curves:
    USD_OIS:
      tenors: [0.25, 0.5, 1.0, 2.0, 3.0, 5.0, 7.0, 10.0]
      rates: [0.038, 0.040, 0.042, 0.044, 0.046, 0.048, 0.050, 0.052]
  spots:
    SPX: 4500.0
  vols:
    SPX: 0.20

models:
  - name: rates_usd
    type: HullWhite1F
    params:
      a: 0.10
      sigma: 0.01
      r0: 0.04
    calibrate_to: USD_OIS
  - name: equity_spx
    type: GBM
    params:
      S0: 4500.0
      mu: 0.06
      sigma: 0.20

correlation:
  - [rates_usd, equity_spx, -0.15]

agreements:
  - id: AGR_MULTI_001
    counterparty: Counterparty_B
    cp_hazard_rate: 0.008
    own_hazard_rate: 0.003
    csa:
      mta: 100000
      threshold: 0
      margin_regime: REGVM
    netting_sets:
      - id: NS_MIXED
        trades:
          - id: trade_irs_001
            type: InterestRateSwap
            model: rates_usd
            params:
              fixed_rate: 0.045
              maturity: 5.0
              notional: 10000000
              payer: true
          - id: trade_opt_001
            type: EuropeanOption
            model: equity_spx
            params:
              strike: 4700.0
              expiry: 2.0
              sigma: 0.20
              risk_free_rate: 0.04
              option_type: call

outputs:
  confidence: 0.95
  write_raw_paths: false
